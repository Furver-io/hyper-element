<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Basic Rendering - hyper-element Kitchen Sink</title>
    <script src="test-loader.js"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
      }
      section {
        margin: 2rem 0;
        padding: 1rem;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      section[data-test-result='pass'] {
        border-color: green;
        background: #f0fff0;
      }
      section[data-test-result='fail'] {
        border-color: red;
        background: #fff0f0;
      }
      h1 {
        border-bottom: 2px solid #333;
      }
      h2 {
        margin-top: 0;
      }
      pre {
        background: #f5f5f5;
        padding: 1rem;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>Basic Rendering</h1>
    <p>
      Demonstrates the simplest use of hyper-element: defining a custom element
      with a render method.
    </p>

    <section data-test="simple-element" data-test-result="pending">
      <h2>Simple Element</h2>
      <p>A minimal custom element that renders static content.</p>
      <pre><code>class extends hyperElement {
  render(Html) {
    Html`Hello from hyper-element!`
  }
}</code></pre>
      <div id="simple-output"></div>
      <script type="module">
        const section = document.querySelector('[data-test="simple-element"]');
        const code = section.querySelector('code').textContent;

        // Define element first using code from <pre><code>
        customElements.define('simple-element', eval(`(${code})`));

        // Then create and append it
        const elem = document.createElement('simple-element');
        document.getElementById('simple-output').appendChild(elem);

        requestAnimationFrame(() => {
          const expected = '<simple-element>Hello from hyper-element!</simple-element>';
          if (elem && elem.outerHTML === expected) {
            section.dataset.testResult = 'pass';
          } else {
            section.dataset.testResult = 'fail';
            console.error('Expected HTML:', expected);
            console.error('Actual HTML:', elem ? elem.outerHTML : null);
          }
        });
      </script>
    </section>

    <a href="index.html">&larr; Back to Kitchen Sink</a>
  </body>
</html>
